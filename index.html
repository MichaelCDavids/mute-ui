<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mute UI Demo</title>
    <style>
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
      @keyframes jiggle {
        0%, 100% { transform: rotate(0); }
        25% { transform: rotate(-3deg); }
        75% { transform: rotate(3deg); }
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-15px); }
        60% { transform: translateY(-7px); }
      }
      @keyframes flash {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0; }
      }
      @keyframes headShake {
        0% { transform: translateX(0); }
        6.5% { transform: translateX(-3px) rotateY(-4.5deg); }
        18.5% { transform: translateX(2.5px) rotateY(3.5deg); }
        31.5% { transform: translateX(-1.5px) rotateY(-2.5deg); }
        43.5% { transform: translateX(1px) rotateY(1.5deg); }
        50% { transform: translateX(0); }
      }
      @keyframes jello {
        0%, 11.1%, 100% { transform: none; }
        22.2% { transform: skewX(-12.5deg) skewY(-12.5deg); }
        33.3% { transform: skewX(6.25deg) skewY(6.25deg); }
        44.4% { transform: skewX(-3.125deg) skewY(-3.125deg); }
        55.5% { transform: skewX(1.5625deg) skewY(1.5625deg); }
        66.6% { transform: skewX(-0.78125deg) skewY(-0.78125deg); }
        77.7% { transform: skewX(0.390625deg) skewY(0.390625deg); }
        88.8% { transform: skewX(-0.1953125deg) skewY(-0.1953125deg); }
      }
      @keyframes rubberBand {
        from { transform: scale3d(1, 1, 1); }
        30% { transform: scale3d(1.25, 0.75, 1); }
        40% { transform: scale3d(0.75, 1.25, 1); }
        50% { transform: scale3d(1.15, 0.85, 1); }
        65% { transform: scale3d(.95, 1.05, 1); }
        75% { transform: scale3d(1.05, .95, 1); }
        to { transform: scale3d(1, 1, 1); }
      }
      @keyframes swing {
        20% { transform: rotate3d(0, 0, 1, 15deg); }
        40% { transform: rotate3d(0, 0, 1, -10deg); }
        60% { transform: rotate3d(0, 0, 1, 5deg); }
        80% { transform: rotate3d(0, 0, 1, -5deg); }
        to { transform: rotate3d(0, 0, 1, 0deg); }
      }
      @keyframes tada {
        from { transform: scale3d(1, 1, 1); }
        10%, 20% { transform: scale3d(.9, .9, .9) rotate3d(0, 0, 1, -3deg); }
        30%, 50%, 70%, 90% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, 3deg); }
        40%, 60%, 80% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, -3deg); }
        to { transform: scale3d(1, 1, 1); }
      }
      @keyframes wobble {
        from { transform: translate3d(0, 0, 0); }
        15% { transform: translate3d(-25%, 0, 0) rotate3d(0, 0, 1, -5deg); }
        30% { transform: translate3d(20%, 0, 0) rotate3d(0, 0, 1, 3deg); }
        45% { transform: translate3d(-15%, 0, 0) rotate3d(0, 0, 1, -3deg); }
        60% { transform: translate3d(10%, 0, 0) rotate3d(0, 0, 1, 2deg); }
        75% { transform: translate3d(-5%, 0, 0) rotate3d(0, 0, 1, -1deg); }
        to { transform: translate3d(0, 0, 0); }
      }
      @keyframes hinge {
        0% { transform: rotate3d(0, 0, 1, 0); transform-origin: top left; animation-timing-function: ease-in-out; }
        20%, 60% { transform: rotate3d(0, 0, 1, 80deg); transform-origin: top left; animation-timing-function: ease-in-out; }
        40%, 80% { transform: rotate3d(0, 0, 1, 60deg); transform-origin: top left; animation-timing-function: ease-in-out; }
        to { transform: translate3d(0, 700px, 0); opacity: 0; }
      }
      @keyframes jackInTheBox {
        from { opacity: 0; transform: scale(0.1) rotate(30deg); transform-origin: center bottom; }
        50% { transform: rotate(-10deg); }
        70% { transform: rotate(3deg); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes rollIn {
        from { opacity: 0; transform: translate3d(-100%, 0, 0) rotate3d(0, 0, 1, -120deg); }
        to { opacity: 1; transform: translate3d(0, 0, 0); }
      }
      @keyframes rollOut {
        from { opacity: 1; }
        to { opacity: 0; transform: translate3d(100%, 0, 0) rotate3d(0, 0, 1, 120deg); }
      }
      @keyframes zoomIn {
        from { opacity: 0; transform: scale3d(.3, .3, .3); }
        50% { opacity: 1; }
      }
      @keyframes zoomOut {
        from { opacity: 1; }
        50% { opacity: 0; transform: scale3d(.3, .3, .3); }
        to { opacity: 0; }
      }
      @keyframes slideInDown {
        from { transform: translate3d(0, -100%, 0); visibility: visible; }
        to { transform: translate3d(0, 0, 0); }
      }
      @keyframes slideInUp {
        from { transform: translate3d(0, 100%, 0); visibility: visible; }
        to { transform: translate3d(0, 0, 0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
