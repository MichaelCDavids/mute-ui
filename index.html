<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mute-UI - A React UI Library by Michael Davids</title>
    <meta name="description" content="Mute-UI is a small, opinionated set of React components for building clean and visually 'muted' user interfaces." />
    <meta name="author" content="Michael Davids" />
    <meta name="keywords" content="React, UI, Library, Components, Design System, Mute-UI" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mute-ui.com/">
    <meta property="og:title" content="Mute-UI by Michael Davids">
    <meta property="og:description" content="A React UI Library for clean and muted interfaces.">
    <meta property="og:image" content="/vite.svg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mute-ui.com/">
    <meta property="twitter:title" content="Mute-UI by Michael Davids">
    <meta property="twitter:description" content="A React UI Library for clean and muted interfaces.">
    <meta property="twitter:image" content="/vite.svg">
    
    <style>
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }
      @keyframes jiggle {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-2deg);
        }
        50% {
          transform: rotate(2deg);
        }
        75% {
          transform: rotate(-2deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
